<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <title>Software Developer | Nicholas Klaene</title>
  </head>

  <body>
    <!-- Mounting Vue App -->
    <div id="app">
      <!-- Navbar (Dark Theme Button Only) -->
      <nav>
        <a class="theme theme-light" id="theme" @click="toggleDarkMode"
          >Dark Theme: <span id="current-mode">Off</span></a
        >
      </nav>

      <!-- Main Content -->
      <main>
        <div class="name">Nick Klaene</div>
        <div class="preview">Software Developer based in Cincinnati, OH</div>

        <p class="about">
          Focused on building web-based applications that solve real world
          problems. I love exploring new technologies and have a passion for
          bringing ideas to life with code.
        </p>

        <a @click="toggleModal" class="link link-light">Email</a>
        <a href="resume.pdf" target="__blank" class="link link-light">Resume</a>
        <a
          href="https://github.com/nicholasklaene"
          target="__blank"
          class="link link-light"
          >Github</a
        >
        <a
          href="https://www.linkedin.com/in/nicholas-klaene/"
          target="__blank"
          class="link link-light"
          >Linkedin</a
        >
      </main>

      <!-- Modal -->
      <div id="modal" v-if="showModal" @click.self="toggleModal">
        <div id="popup" :class="{'bg-dark': darkMode}">
          <h2>Get in Touch</h2>
          <div class="form-group">
            <label>
              <span :class="{'span-dark': darkMode}"> Email</span>
            </label>
            <input
              :class="{'error': errors.email, 'bg-dark': darkMode}"
              @change="evalEmail"
              type="email"
              placeholder="Required"
              v-model="email"
            />
          </div>
          <div class="form-group">
            <label><span :class="{'span-dark': darkMode}">Name</span></label>
            <input
              type="text"
              placeholder="John Smith"
              v-model="name"
              :class="{'bg-dark': darkMode}"
            />
          </div>
          <div class="form-group">
            <label><span :class="{'span-dark': darkMode}">Message</span></label>
            <textarea
              v-model="message"
              :class="{'bg-dark': darkMode}"
              placeholder="Your message goes here..."
            ></textarea>
          </div>
          <div class="btn-wrap">
            <a
              class="theme"
              :class="{'btn-dark': darkMode}"
              @click="saveContactInfo"
              >Get in Touch</a
            >
          </div>
        </div>
      </div>
    </div>

    <!-- Vue CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14"></script>
    <!-- My JS -->
    <script src="js/contactForm.js"></script>
    <script src="js/darkMode.js"></script>
  </body>
</html>
