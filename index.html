<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="./images/logo.png" type="image/x-icon">
    <title>Nicholas Klaene</title>
</head>
<body>
    
    <div class="wrapper">
        <div class="center-container">
            <div class="logo">
                <img src="./images/logo.png" alt="logo" height="120px" width="120px">
            </div>
            <div class="btns">
                <a id="blog" class="btn">BLOG</a>
                <a id="portfolio" class="btn">PORTFOLIO</a>
                <a id="contact" class="btn">CONTACT</a>
                <a id="about" class="btn">ABOUT</a>
            </div>

            <div class="color-mode">

                <div id="light" class="mode"></div>
                <div id="dark" class="mode"></div>

            </div>
        </div>
    </div>
    
</body>
</html>
